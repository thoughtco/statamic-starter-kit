title: 'Slider Settings'
fields:
  -
    handle: slider_effect
    field:
      options:
        slide: Slide
        fade: Fade
      max_items: 1
      push_tags: false
      default: slide
      display: 'Slider Effect'
      type: select
      instructions: 'Would you like the slides to cross fade or slide from right to left.'
      width: 33
      validate:
        - required
  -
    handle: time_delay
    field:
      min: 1000
      max: 10000
      step: 1000
      default: 5000
      prepend: Faster
      append: Slower
      display: 'Time Delay'
      type: range
      instructions: 'How long you want a slide to be visible for'
      width: 33
  -
    handle: show_pagination
    field:
      type: toggle
      display: 'Show Pagination'
      width: 33
